<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#090b0d">
<title>Królestwo Popiołu — ładowanie</title>
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#090b0d;color:#d6d1c3;font:700 16px ui-monospace,monospace;text-align:center}
small{display:block;margin-top:12px;color:#8f9188}
</style>
</head>
<body>
<div id="status">Przywoływanie Królestwa Popiołu…<small>Ładowanie gry</small></div>
<script>
(async()=>{
  try{
    const files=Array.from({length:8},(_,i)=>`src/part-${String(i+1).padStart(2,'0')}.txt`);
    const parts=await Promise.all(files.map(async file=>{
      const res=await fetch(file,{cache:'no-cache'});
      if(!res.ok) throw new Error(`${file}: ${res.status}`);
      return res.text();
    }));
    document.open();
    document.write(parts.join(''));
    document.close();
  }catch(error){
    console.error(error);
    document.getElementById('status').innerHTML='Nie udało się wczytać gry.<small>Odśwież stronę lub sprawdź połączenie.</small>';
  }
})();
</script>
</body>
</html>
